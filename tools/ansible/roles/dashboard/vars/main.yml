---
# Dashboard deployment configuration

# GitHub Container Registry
ghcr_registry: ghcr.io/trv-enterprises

# Image names (renamed dashboard-* -> outpost-* for the TRV Outpost rebrand).
# Pre-rename tags (0.27.2 and earlier) live under the OLD dashboard-* names;
# 0.28.0 forward is published under outpost-*. To deploy a pre-rename version
# (rollback), override BOTH the version and these image names back to dashboard-*.
dashboard_server_image: "{{ ghcr_registry }}/outpost-server"
dashboard_client_image: "{{ ghcr_registry }}/outpost-client"

# Default version (override with --extra-vars "dashboard_version=0.3.0")
# Note: GHCR tags do NOT have 'v' prefix
# 0.28.0 is the first post-rename release (matches the outpost-* image names
# above); it is the next version after the 0.27.2 currently on prod.
dashboard_version: 0.28.0

# Deployment directory on target
dashboard_deploy_dir: /opt/dashboard

# NOTE: dashboard_domain and dashboard_enable_https live in defaults/main.yml,
# NOT here. Role vars/ outranks inventory host_vars, so anything here CANNOT be
# overridden per-host — which is exactly what pre-prod needs to do for HTTPS.
# (This bit us 2026-06-10: a dashboard_domain set here silently overrode the
# pre-prod host_var and the box stayed on :80.) Keep overridable knobs in
# defaults/.

# Required: Set via --extra-vars or environment
# anthropic_api_key: "sk-ant-..."

# Anthropic key for the in-app AI features (Component AI agent + Dashboard
# Assistant). The server resolves keys in order DASHBOARD_LLM_API_KEY ->
# ASSISTANT_ANTHROPIC_API_KEY -> ANTHROPIC_API_KEY; we deliver it via
# ASSISTANT_ANTHROPIC_API_KEY. Sourced from the DEPLOY-TIME ENVIRONMENT (not the
# vault, not the repo) — export ASSISTANT_ANTHROPIC_API_KEY before deploying.
# Falls back to anthropic_api_key (vault) if the env var is unset, so existing
# deploys keep working. The app's `ai.enabled` master setting (default true,
# stored in Mongo) must also be on; a key alone does not enable AI.
assistant_anthropic_api_key: "{{ lookup('env', 'ASSISTANT_ANTHROPIC_API_KEY') | default(anthropic_api_key | default(''), true) }}"

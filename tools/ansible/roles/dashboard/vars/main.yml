---
# Dashboard deployment configuration

# GitHub Container Registry
ghcr_registry: ghcr.io/trv-enterprises

# Image names (renamed dashboard-* -> outpost-* for the TRV Outpost rebrand).
# Pre-rename tags (0.27.2 and earlier) live under the OLD dashboard-* names;
# 0.28.0 forward is published under outpost-*. To deploy a pre-rename version
# (rollback), override BOTH the version and these image names back to dashboard-*.
dashboard_server_image: "{{ ghcr_registry }}/outpost-server"
dashboard_client_image: "{{ ghcr_registry }}/outpost-client"

# Default version (override with --extra-vars "dashboard_version=0.3.0")
# Note: GHCR tags do NOT have 'v' prefix
# 0.28.0 is the first post-rename release (matches the outpost-* image names
# above); it is the next version after the 0.27.2 currently on prod.
dashboard_version: 0.28.0

# Deployment directory on target
dashboard_deploy_dir: /opt/dashboard

# Domain for Caddy (use IP or hostname for direct access)
# :80 prefix forces HTTP-only mode (no TLS)
# IP address alone would trigger self-signed TLS which has issues
dashboard_domain: ":80"

# Required: Set via --extra-vars or environment
# anthropic_api_key: "sk-ant-..."

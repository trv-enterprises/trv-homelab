---
# Weather Poller deployment tasks

- name: Validate Visual Crossing API key
  ansible.builtin.fail:
    msg: "visual_crossing_key is required. Set in vault."
  when: visual_crossing_key is not defined or visual_crossing_key == ""

- name: Deploy weather-poller env file
  ansible.builtin.template:
    src: weather-poller.env.j2
    dest: "{{ services_deploy_dir }}/weather-poller.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  become: true
  register: env_file

- name: Pull latest weather-poller image
  ansible.builtin.command:
    cmd: docker compose pull weather-poller
    chdir: "{{ services_deploy_dir }}"
  register: pull_result
  changed_when: "'Downloaded' in pull_result.stderr or 'Pulled' in pull_result.stderr"

- name: Start/update weather-poller
  ansible.builtin.command:
    cmd: docker compose up -d weather-poller
    chdir: "{{ services_deploy_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr"

- name: Wait for weather-poller to start
  ansible.builtin.command:
    cmd: docker compose ps weather-poller --format json
    chdir: "{{ services_deploy_dir }}"
  register: compose_ps
  until: "'running' in compose_ps.stdout"
  retries: 6
  delay: 5
  changed_when: false

- name: Show recent logs
  ansible.builtin.command:
    cmd: docker compose logs --tail=10 weather-poller
    chdir: "{{ services_deploy_dir }}"
  register: poller_logs
  changed_when: false

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Weather poller deployed successfully!
      Image: {{ weather_poller_image }}:{{ weather_poller_version }}
      Location: {{ weather_location }}
      Poll interval: {{ poll_interval }}, Alert interval: {{ alert_interval }}
      Recent logs:
      {{ poller_logs.stdout }}

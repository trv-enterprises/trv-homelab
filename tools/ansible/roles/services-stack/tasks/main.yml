---
# Services stack deployment tasks
# Deploys the shared docker-compose.yml for the services LXC

- name: Validate GHCR token
  ansible.builtin.fail:
    msg: "ghcr_token is required for pulling from GitHub Container Registry."
  when: ghcr_token is not defined or ghcr_token == ""

- name: Login to GitHub Container Registry
  ansible.builtin.shell:
    cmd: echo "{{ ghcr_token }}" | docker login ghcr.io -u trv-enterprises --password-stdin
  register: docker_login
  changed_when: false
  no_log: true

- name: Create services deployment directory
  ansible.builtin.file:
    path: "{{ services_deploy_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ services_deploy_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: true
  register: compose_file

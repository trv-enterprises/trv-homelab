services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      # Config is bind-mounted from the deploy dir so it's the single
      # source of truth (managed by the services-stack Ansible role).
      # Using a named volume for /mosquitto/config previously hid the
      # real config inside Docker and blocked updates to persistence
      # and listener settings — see 2026-04-11 incident.
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
      - "9883:9883"

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    restart: unless-stopped
    volumes:
      - zigbee2mqtt_data:/app/data
    ports:
      - "8080:8080"
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      - TZ=America/New_York
    depends_on:
      - mosquitto

  weather-poller:
    image: ghcr.io/trv-enterprises/weather-poller:latest
    restart: unless-stopped
    env_file:
      - weather-poller.env
    environment:
      - TZ=America/Chicago
    depends_on:
      - mosquitto

  homebridge:
    image: homebridge/homebridge:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - homebridge_data:/homebridge
    environment:
      - TZ=America/Chicago
      - HOMEBRIDGE_CONFIG_UI=1
      - HOMEBRIDGE_CONFIG_UI_PORT=8581
    depends_on:
      - mosquitto

  alert-engine:
    image: ghcr.io/trv-enterprises/alert-engine:latest
    restart: unless-stopped
    volumes:
      - ./rules.yaml:/etc/alert-engine/rules.yaml:ro
    environment:
      - TZ=America/Chicago
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:
  zigbee2mqtt_data:
  homebridge_data:

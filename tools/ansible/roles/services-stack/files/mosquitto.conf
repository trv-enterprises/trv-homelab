# Mosquitto MQTT Broker Configuration
# Deployed to the services LXC as a bind-mounted file.
# See https://mosquitto.org/man/mosquitto-conf-5.html

# MQTT listener (for in-LXC services and LAN netclients)
listener 1883
protocol mqtt

# WebSocket listener (for the kiosk display React app)
listener 9001
protocol websockets

# HTTP API / dashboard listener (management UI)
listener 9883
protocol http_api
http_dir /usr/share/mosquitto/dashboard

# Allow unauthenticated connections.
# Everything on the LAN is trusted; this broker is not exposed outside.
allow_anonymous true

# Persistence.
# Retained messages and durable-session state are written to disk
# so they survive broker restarts. /mosquitto/data/ is the named
# volume mount point. Only retained messages (and cleanSession=false
# subscription state) get persisted — transient non-retained messages
# are NEVER written to disk regardless of this setting.
persistence true
persistence_location /mosquitto/data/
# Write the persistence file every 60 seconds if anything changed.
autosave_interval 60

# Connection settings
max_connections -1
max_queued_messages 1000
max_keepalive 300

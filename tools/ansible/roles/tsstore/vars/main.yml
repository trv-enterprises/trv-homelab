---
# tsstore role variables

tsstore_version: "0.4.0"
tsstore_user: <user>
tsstore_group: <user>

# Binary locations
tsstore_bin_dir: /usr/local/bin
tsstore_data_dir: /var/lib/tsstore
tsstore_run_dir: /var/run/tsstore
tsstore_config_dir: /etc/tsstore

# Service configuration
tsstore_port: 21080
tsstore_socket: "{{ tsstore_run_dir }}/tsstore.sock"

# Collectors to enable (override per host in inventory)
tsstore_collectors: []
# Example:
# tsstore_collectors:
#   - name: system-stats
#     interval: 20
#   - name: journal-logs

# Local path to built binaries (ts-store repo is sibling to trv-homelab)
tsstore_local_bin_path: /path/to/ts-store/bin

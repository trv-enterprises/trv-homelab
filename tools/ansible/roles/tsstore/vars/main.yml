---
# tsstore role internal constants.
# Things the operator might want to override per host live in defaults/main.yml,
# not here — vars/ has higher precedence than host_vars.

# Service identity. Service user is created by the role if missing.
tsstore_user: tsstore
tsstore_group: tsstore

# Binary locations
tsstore_bin_dir: /usr/local/bin
tsstore_data_dir: /var/lib/tsstore
tsstore_run_dir: /var/run/tsstore
tsstore_config_dir: /etc/tsstore

# Service configuration
tsstore_port: 21080
tsstore_socket: "{{ tsstore_run_dir }}/tsstore.sock"

# Release-asset download base. Combined with tsstore_version (from defaults)
# and the per-binary name + arch suffix.
tsstore_release_url_base: "https://github.com/trv-enterprises/ts-store/releases/download"

# Recognized Go collectors. The role fails fast if tsstore_collectors
# contains a name not in this list (prevents typos and stops attempts to
# install non-existent binaries like sensehat).
tsstore_known_collectors:
  - system-stats
  - journal-logs

# Per-collector store specifications. The role creates each collector's
# store on first deploy (when meta.tsdb is absent) using these settings,
# then — for schema-type stores — applies the schema via the API before
# the collector starts writing.
#
# IMPORTANT: a schema store rejects any field the collector emits that
# isn't declared here ("field not found in schema"). This schema MUST cover
# every field the collector binary at tsstore_version emits. Capture the
# live set with `system-stats -stdout -interval 1` after a version bump and
# add any new field NAMES below.
#
# The role reconciles this against each existing store BY NAME (see
# tasks/main.yml): missing names are APPENDED at the next free index (safe,
# non-destructive); a rename/retype/reuse of an existing index FAILS the
# play loudly (breaking — would need a store recreation). The `index`
# values here define the canonical layout for FRESH stores only; existing
# stores keep whatever indices/types they already have for shared names
# (e.g. trv-srv-002 created temp.nvme_c at index 18/float64; trv-srv-001 at
# 20/float32 — both fine, reconcile keys on name not index).
#
# These role-internal defaults can be overridden per host via
# tsstore_store_specs in host_vars (see defaults/main.yml).
tsstore_collector_store_specs:
  system-stats:
    type: schema
    blocks: 10000
    # Field set verified against system-stats v0.6.8 (-stdout output).
    # Temps are float32 (matches the live v0.6.8 store on trv-srv-001).
    schema:
      fields:
        - {index: 1, name: "cpu.pct", type: "int32"}
        - {index: 2, name: "memory.total", type: "int64"}
        - {index: 3, name: "memory.used", type: "int64"}
        - {index: 4, name: "memory.available", type: "int64"}
        - {index: 5, name: "memory.pct", type: "int32"}
        - {index: 6, name: "disk_io.read_bytes_sec", type: "int64"}
        - {index: 7, name: "disk_io.write_bytes_sec", type: "int64"}
        - {index: 8, name: "network.rx_bytes_sec", type: "int64"}
        - {index: 9, name: "network.tx_bytes_sec", type: "int64"}
        - {index: 10, name: "disk_space.total", type: "int64"}
        - {index: 11, name: "disk_space.used", type: "int64"}
        - {index: 12, name: "disk_space.available", type: "int64"}
        - {index: 13, name: "disk_space.pct", type: "int32"}
        - {index: 14, name: "swap.total", type: "int64"}
        - {index: 15, name: "swap.used", type: "int64"}
        - {index: 16, name: "swap.pct", type: "int32"}
        - {index: 17, name: "uptime.sec", type: "int64"}
        - {index: 18, name: "temp.cpu_package_c", type: "float32"}
        - {index: 19, name: "temp.cpu_max_core_c", type: "float32"}
        - {index: 20, name: "temp.nvme_c", type: "float32"}
        - {index: 21, name: "temp.pch_c", type: "float32"}
        - {index: 22, name: "temp.nic_c", type: "float32"}
  # journal-logs ships free-form log lines; a json store needs no schema
  # and tolerates field changes across releases. (No schema block ⇒ the
  # role skips the schema PUT for this store.)
  journal-logs:
    type: json
    blocks: 10000

---
# tsstore deployment tasks
#
# Sequence:
#   1. Validate inputs (admin key set, collector names recognized)
#   2. Detect architecture
#   3. Create user + directories
#   4. Download tsstore binary from GitHub release
#   5. Write tsstore env file (admin key)
#   6. Install systemd unit + tmpfiles config
#   7. Start tsstore
#   8. Pre-create per-store data dirs with keys.json (key preservation)
#   9. Render mqtt_connections.json into per-store dirs
#  10. Deploy collectors (binary download + systemd unit + start)

- name: Validate tsstore_admin_key is set
  ansible.builtin.fail:
    msg: >-
      tsstore_admin_key is required. Set <host>_tsstore_admin_key in
      inventory/group_vars/all/vault.yml and reference it from host_vars.
  when: tsstore_admin_key is not defined or (tsstore_admin_key | length) == 0

- name: Validate all collector names are recognized
  ansible.builtin.fail:
    msg: >-
      Collector '{{ item.name }}' is not a known Go collector. Known:
      {{ tsstore_known_collectors | join(', ') }}. To add a new
      collector, ship its binary in the ts-store release and add the
      name to tsstore_known_collectors.
  loop: "{{ tsstore_collectors }}"
  when: item.name not in tsstore_known_collectors

- name: Determine architecture suffix
  ansible.builtin.set_fact:
    tsstore_arch: "{{ 'arm64' if ansible_facts.architecture == 'aarch64' else 'amd64' }}"

- name: Create tsstore service user
  ansible.builtin.user:
    name: "{{ tsstore_user }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  become: true

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0755'
  loop:
    - "{{ tsstore_data_dir }}"
    - "{{ tsstore_run_dir }}"
    - "{{ tsstore_config_dir }}"
  become: true

- name: Download tsstore binary
  ansible.builtin.get_url:
    url: "{{ tsstore_release_url_base }}/{{ tsstore_version }}/tsstore-{{ tsstore_version }}-linux-{{ tsstore_arch }}"
    dest: "{{ tsstore_bin_dir }}/tsstore"
    owner: root
    group: root
    mode: '0755'
    force: true
  become: true
  notify: Restart tsstore

- name: Create tsstore environment file
  ansible.builtin.copy:
    content: |
      TSSTORE_ADMIN_KEY={{ tsstore_admin_key }}
      TSSTORE_DATA_PATH={{ tsstore_data_dir }}
      TSSTORE_PORT={{ tsstore_port }}
      TSSTORE_SOCKET_PATH={{ tsstore_socket }}
    dest: "{{ tsstore_config_dir }}/tsstore.env"
    owner: root
    group: "{{ tsstore_group }}"
    mode: '0640'
  become: true
  no_log: true
  notify: Restart tsstore

- name: Create tsstore systemd service
  ansible.builtin.template:
    src: tsstore.service.j2
    dest: /etc/systemd/system/tsstore.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart tsstore

- name: Create tmpfiles.d config for run directory
  ansible.builtin.copy:
    content: |
      d {{ tsstore_run_dir }} 0755 {{ tsstore_user }} {{ tsstore_group }} -
    dest: /etc/tmpfiles.d/tsstore.conf
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Ensure run directory exists
  ansible.builtin.command:
    cmd: systemd-tmpfiles --create /etc/tmpfiles.d/tsstore.conf
  become: true
  changed_when: false

- name: Enable and start tsstore service
  ansible.builtin.systemd:
    name: tsstore
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Wait for tsstore to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/health"
    status_code: 200
  register: tsstore_health
  until: tsstore_health.status == 200
  retries: 15
  delay: 2

# Store creation. ts-store does NOT auto-create a store on first write —
# a write to a non-existent store fails ("failed to open meta file ...
# meta.tsdb: no such file or directory"), and a schema-type store further
# rejects writes until its schema is registered. So we explicitly create
# each collector's store here (when missing); the schema is applied a few
# tasks below, AFTER keys.json is reseeded with the vault key (the schema
# endpoint authenticates with the store's own API key, not the admin key).
#
# Idempotent: keyed on the presence of meta.tsdb, so existing stores
# (including manually-created ones on trv-srv-001 / trv-pi-001) are left
# untouched — their data and schema are never clobbered.

- name: Resolve effective store specs (role defaults + host overrides)
  ansible.builtin.set_fact:
    tsstore_effective_store_specs: >-
      {{ tsstore_collector_store_specs | combine(tsstore_store_specs, recursive=True) }}

- name: Check which stores already exist (meta.tsdb present)
  ansible.builtin.stat:
    path: "{{ tsstore_data_dir }}/{{ item.name }}/meta.tsdb"
  loop: "{{ tsstore_collectors }}"
  loop_control:
    label: "{{ item.name }}"
  register: tsstore_meta_stat
  become: true

- name: Create stores that don't exist yet
  ansible.builtin.command:
    cmd: >-
      {{ tsstore_bin_dir }}/tsstore create {{ item.item.name }}
      --path {{ tsstore_data_dir }}
      --type {{ (tsstore_effective_store_specs[item.item.name] | default({})).type | default('json') }}
      --blocks {{ (tsstore_effective_store_specs[item.item.name] | default({})).blocks | default(1024) }}
    # tsstore reads an optional config.json from cwd; run from a dir the
    # service user can read to avoid a "permission denied" on config.json.
    chdir: "{{ tsstore_data_dir }}"
  environment:
    TSSTORE_DATA_PATH: "{{ tsstore_data_dir }}"
  loop: "{{ tsstore_meta_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not item.stat.exists
  become: true
  become_user: "{{ tsstore_user }}"
  register: tsstore_created
  changed_when: true

# Per-store API key preservation. The role seeds keys.json with the
# SHA-256 of the vault-managed key so the collector can authenticate from
# the moment it starts, and the same key survives across re-deploys.
- name: Pre-create per-store data directories
  ansible.builtin.file:
    path: "{{ tsstore_data_dir }}/{{ item.key }}"
    state: directory
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0755'
  loop: "{{ tsstore_store_api_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
  no_log: true

# Migration safety: a store directory that pre-existed from a manual
# install may have files owned by the original install user (e.g.
# tviviano). The tsstore daemon, running as the dedicated service
# user, must be able to read AND write every file inside. Recursive
# chown ensures that. Idempotent — no-op when ownership is already
# correct.
- name: Ensure store dir contents are owned by service user
  ansible.builtin.file:
    path: "{{ tsstore_data_dir }}/{{ item.key }}"
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    recurse: true
  loop: "{{ tsstore_store_api_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
  no_log: true
  notify: Restart tsstore

- name: Compute SHA-256 of each store API key
  ansible.builtin.set_fact:
    tsstore_key_hashes: >-
      {{
        tsstore_key_hashes | default({}) | combine({
          item.key: item.value | hash('sha256')
        })
      }}
  loop: "{{ tsstore_store_api_keys | dict2items }}"
  no_log: true

- name: Read existing keys.json (if any) to decide what changes
  ansible.builtin.slurp:
    src: "{{ tsstore_data_dir }}/{{ item.key }}/keys.json"
  loop: "{{ tsstore_store_api_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: tsstore_existing_keys
  become: true
  failed_when: false
  changed_when: false
  no_log: true

- name: Write keys.json for stores whose hash differs
  ansible.builtin.copy:
    content: |
      {
        "store_name": "{{ item.item.key }}",
        "keys": [
          {
            "id": "{{ item.item.value[8:16] }}",
            "hash": "{{ tsstore_key_hashes[item.item.key] }}",
            "created_at": "{{ ansible_date_time.iso8601 }}",
            "note": "Managed by Ansible tsstore role"
          }
        ]
      }
    dest: "{{ tsstore_data_dir }}/{{ item.item.key }}/keys.json"
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0640'
  loop: "{{ tsstore_existing_keys.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: >
    item.content is not defined or
    (item.content | b64decode | from_json)['keys'][0].hash != tsstore_key_hashes[item.item.key]
  become: true
  no_log: true
  notify: Restart tsstore

# Apply the schema to stores we just created this run. Runs AFTER keys.json
# is reseeded with the vault key, because the schema endpoint authenticates
# with the store's API key (the admin key is rejected, 401). ts-store reads
# keys.json per request, so the deferred "Restart tsstore" handler need not
# have fired yet. Skipped for pre-existing stores (schema is immutable once
# set) and for stores whose spec has no `schema` block (json/text/binary).
- name: Apply schema to newly-created schema-type stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores/{{ item.item.name }}/schema"
    method: PUT
    headers:
      X-API-Key: "{{ tsstore_store_api_keys[item.item.name] }}"
    body_format: json
    body: "{{ tsstore_effective_store_specs[item.item.name].schema }}"
    status_code: 200
  loop: "{{ tsstore_meta_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - not item.stat.exists
    - (tsstore_effective_store_specs[item.item.name] | default({})).schema is defined
  become: true
  no_log: true

# Schema reconciliation for stores that ALREADY exist (e.g. after a
# tsstore_version bump whose collector emits new fields). ts-store reads
# project every record through the active schema by index, so the only
# SAFE evolution is APPEND: add a new field name at the next free index.
# Renaming/retyping/dropping an existing field is read-destructive and is
# refused here (the play fails loudly rather than silently breaking data).
#
# Reconciliation keys on field NAME, not index — existing stores keep
# whatever indices/types they already assigned to shared names (e.g.
# trv-srv-001 vs trv-srv-002 differ on temp.nvme_c's index/type, both ok).

- name: Identify existing schema-type stores to reconcile
  ansible.builtin.set_fact:
    tsstore_schema_reconcile: >-
      {{
        tsstore_meta_stat.results
        | selectattr('stat.exists')
        | map(attribute='item.name')
        | select('in', (tsstore_effective_store_specs
                        | dict2items
                        | selectattr('value.schema', 'defined')
                        | map(attribute='key') | list))
        | list
      }}

# A single Python helper does the GET → name-keyed diff → conditional PUT
# per store. This is far more robust than reconciling name/type/index in
# Jinja. Pure stdlib (urllib), runs on the target as the service user.
- name: Install schema-reconcile helper
  ansible.builtin.template:
    src: schema_reconcile.py.j2
    dest: "{{ tsstore_config_dir }}/schema_reconcile.py"
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0750'
  become: true
  when: tsstore_schema_reconcile | length > 0

- name: Write desired schema for each store to reconcile
  ansible.builtin.copy:
    content: "{{ tsstore_effective_store_specs[item].schema | to_nice_json }}"
    dest: "{{ tsstore_config_dir }}/schema_desired_{{ item }}.json"
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0640'
  loop: "{{ tsstore_schema_reconcile }}"
  become: true

- name: Reconcile schema (append-only) for existing schema-type stores
  ansible.builtin.command:
    cmd: >-
      {{ tsstore_python | default('/usr/bin/python3') }}
      {{ tsstore_config_dir }}/schema_reconcile.py
      --port {{ tsstore_port }}
      --store {{ item }}
      --key {{ tsstore_store_api_keys[item] }}
      --desired {{ tsstore_config_dir }}/schema_desired_{{ item }}.json
  loop: "{{ tsstore_schema_reconcile }}"
  register: tsstore_reconcile
  changed_when: "'CHANGED' in tsstore_reconcile.stdout"
  become: true
  no_log: true

# Even when hash matches and the file isn't rewritten, ensure ownership
# is correct. Pre-existing keys.json from a tviviano-run install will
# be unreadable by the tsstore service user otherwise.
- name: Ensure keys.json ownership/permissions
  ansible.builtin.file:
    path: "{{ tsstore_data_dir }}/{{ item.key }}/keys.json"
    owner: "{{ tsstore_user }}"
    group: "{{ tsstore_group }}"
    mode: '0640'
    state: file
  loop: "{{ tsstore_store_api_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
  no_log: true
  notify: Restart tsstore

- name: Render MQTT stream configurations
  ansible.builtin.include_tasks: mqtt-streams.yml
  when: tsstore_mqtt_streams | length > 0

- name: Deploy collectors
  ansible.builtin.include_tasks: collectors.yml
  when: tsstore_collectors | length > 0

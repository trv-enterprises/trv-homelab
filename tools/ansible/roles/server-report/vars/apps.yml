# Application definitions for detection and health checking
app_definitions:
  dashboard:
    display_name: Dashboard
    detection:
      docker_patterns:
        - "dashboard-server"
        - "dashboard-caddy"
        - "dashboard-mongodb"
        - "dashboard-redis"
        - "<github-username>/dashboard"
      ports:
        - 80     # caddy HTTP
        - 443    # caddy HTTPS
        - 3001   # server API
    health_checks:
      - name: api
        port: 3001
        path: /health

  tsstore:
    display_name: ts-store
    detection:
      systemd_services:
        - tsstore
      user_services:
        - tsstore
      ports:
        - 21080
    health_checks:
      - name: rest
        port: 21080
        path: /health

  collectors:
    display_name: Data Collectors
    detection:
      user_services:
        - sensehat-to-tsstore
        - system-stats-to-tsstore
        - journal-to-tsstore
        - shelly-to-tsstore
      systemd_services:
        - system-stats
        - journal-logs

  mosquitto:
    display_name: Mosquitto MQTT
    detection:
      docker_patterns:
        - "eclipse-mosquitto"
        - "mosquitto"
      systemd_services:
        - mosquitto
      ports:
        - 1883
        - 9001

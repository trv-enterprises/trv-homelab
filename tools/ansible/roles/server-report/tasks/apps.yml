---
# Categorize detected services into application groups

- name: Initialize app inventory
  ansible.builtin.set_fact:
    app_inventory:
      dashboard: []
      tsstore: []
      collectors: []
      mosquitto: []
      other: []

# Dashboard detection
- name: Detect Dashboard containers
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'dashboard': app_inventory.dashboard + [{'name': item.name, 'type': 'docker', 'image': item.image, 'status': item.status, 'ports': item.ports}]}) }}"
  loop: "{{ docker_containers | default([]) }}"
  when: "'dashboard-' in item.name or '<github-username>/dashboard' in item.image"

# ts-store detection (system service)
- name: Detect tsstore system service
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'tsstore': app_inventory.tsstore + [{'name': 'tsstore', 'type': 'systemd-system', 'status': 'running'}]}) }}"
  when: "'tsstore' in system_services"

# ts-store detection (user service)
- name: Detect tsstore user service
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'tsstore': app_inventory.tsstore + [{'name': 'tsstore', 'type': 'systemd-user', 'status': 'running'}]}) }}"
  when: "'tsstore' in user_services"

# Data collectors (user services)
- name: Detect data collectors
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'collectors': app_inventory.collectors + [{'name': item, 'type': 'systemd-user', 'status': 'running'}]}) }}"
  loop:
    - sensehat-to-tsstore
    - system-stats-to-tsstore
    - journal-to-tsstore
    - shelly-to-tsstore
  when: item in user_services

# Data collectors (system services)
- name: Detect system-level collectors
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'collectors': app_inventory.collectors + [{'name': item, 'type': 'systemd-system', 'status': 'running'}]}) }}"
  loop:
    - system-stats
    - journal-logs
  when: item in system_services

# Mosquitto detection (Docker)
- name: Detect Mosquitto containers
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'mosquitto': app_inventory.mosquitto + [{'name': item.name, 'type': 'docker', 'image': item.image, 'status': item.status, 'ports': item.ports}]}) }}"
  loop: "{{ docker_containers | default([]) }}"
  when: "'mosquitto' in item.name or 'eclipse-mosquitto' in item.image"

# Mosquitto detection (systemd)
- name: Detect Mosquitto systemd
  ansible.builtin.set_fact:
    app_inventory: "{{ app_inventory | combine({'mosquitto': app_inventory.mosquitto + [{'name': 'mosquitto', 'type': 'systemd', 'status': 'running', 'port': 1883}]}) }}"
  when: "'mosquitto' in system_services"

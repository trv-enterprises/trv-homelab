---
# Simulators deployment tasks
# Syncs simulator source from dashboard repo, deploys .env, builds and starts services

- name: Validate simulator secrets
  ansible.builtin.fail:
    msg: "simulators_tsstore_admin_key and simulators_tsstore_api_key are required. Set in vault."
  when: >
    simulators_tsstore_admin_key is not defined or simulators_tsstore_admin_key == "" or
    simulators_tsstore_api_key is not defined or simulators_tsstore_api_key == ""

- name: Validate GHCR token
  ansible.builtin.fail:
    msg: "ghcr_token is required for pulling from GitHub Container Registry."
  when: ghcr_token is not defined or ghcr_token == ""

- name: Login to GitHub Container Registry
  ansible.builtin.shell:
    cmd: echo "{{ ghcr_token }}" | docker login ghcr.io -u trv-enterprises --password-stdin
  register: docker_login
  changed_when: false
  no_log: true

- name: Create simulators deployment directory
  ansible.builtin.file:
    path: "{{ simulators_deploy_dir }}"
    state: directory
    mode: '0755'

- name: Sync simulator source to remote
  ansible.posix.synchronize:
    src: "{{ simulators_source }}/"
    dest: "{{ simulators_deploy_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.claude"
      - "--exclude=*.pyc"
      - "--exclude=__pycache__"
      - "--exclude=.DS_Store"
      - "--exclude=._*"
      - "--exclude=.env"
      - "--exclude=.env.example"

- name: Deploy simulators env file
  ansible.builtin.template:
    src: simulators.env.j2
    dest: "{{ simulators_deploy_dir }}/.env"
    mode: '0600'
  register: env_file

- name: Build Docker images
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ simulators_deploy_dir }}"
  register: build_result
  changed_when: "'Building' in build_result.stdout or 'Building' in build_result.stderr"

- name: Start services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ simulators_deploy_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr"

- name: Wait for ts-store to be healthy
  ansible.builtin.command:
    cmd: docker inspect simulators-tsstore --format '{{ '{{' }}.State.Health.Status{{ '}}' }}'
  register: health_check
  until: health_check.stdout == "healthy"
  retries: 15
  delay: 2
  changed_when: false

- name: Fix ts-store data volume ownership
  ansible.builtin.command:
    cmd: docker exec -u root simulators-tsstore chown tsstore:tsstore /data
  changed_when: false
  failed_when: false

- name: Get existing stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores"
    method: GET
    headers:
      X-Admin-Key: "{{ simulators_tsstore_admin_key }}"
    return_content: true
  register: stores_response
  ignore_errors: true

- name: Create location stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores"
    method: POST
    headers:
      X-Admin-Key: "{{ simulators_tsstore_admin_key }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ item }}"
      num_blocks: 200000
      data_block_size: 512
      index_block_size: 4096
    status_code: [200, 201, 409]
  loop: "{{ simulators_tsstore_stores }}"
  when: stores_response is failed or stores_response.json.stores is not defined or item not in stores_response.json.stores
  register: store_creation

- name: Compute API key hash
  ansible.builtin.command:
    cmd: printf '%s' '{{ simulators_tsstore_api_key }}' | sha256sum | awk '{print $1}'
  register: api_key_hash
  changed_when: false
  delegate_to: localhost

- name: Write shared API key to new stores
  ansible.builtin.copy:
    dest: /tmp/tsstore-keys-{{ item.item }}.json
    content: |
      {
        "store_name": "{{ item.item }}",
        "keys": [
          {
            "id": "{{ simulators_tsstore_api_key[8:16] }}",
            "hash": "{{ api_key_hash.stdout }}",
            "created_at": "{{ ansible_date_time.iso8601 }}",
            "note": "Shared key via Ansible deploy"
          }
        ]
      }
    mode: '0600'
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

- name: Copy key files into ts-store container
  ansible.builtin.command:
    cmd: docker cp /tmp/tsstore-keys-{{ item.item }}.json simulators-tsstore:/data/{{ item.item }}/keys.json
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

- name: Clean up temporary key files
  ansible.builtin.file:
    path: /tmp/tsstore-keys-{{ item.item }}.json
    state: absent
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

- name: Restart ts-store to reload keys
  ansible.builtin.command:
    cmd: docker compose restart tsstore
    chdir: "{{ simulators_deploy_dir }}"
  when: store_creation.changed

- name: Wait for ts-store to be healthy after key reload
  ansible.builtin.command:
    cmd: docker inspect simulators-tsstore --format '{{ '{{' }}.State.Health.Status{{ '}}' }}'
  register: health_recheck
  until: health_recheck.stdout == "healthy"
  retries: 15
  delay: 2
  changed_when: false
  when: store_creation.changed

- name: Show service status
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: "{{ simulators_deploy_dir }}"
  register: status
  changed_when: false

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Simulators deployed successfully!
      Directory: {{ simulators_deploy_dir }}
      Services:
      {{ status.stdout }}

---
# Simulators deployment tasks
# Syncs simulator source from dashboard repo, deploys .env, builds and starts services

- name: Validate simulator secrets
  ansible.builtin.fail:
    msg: "simulators_tsstore_admin_key and simulators_tsstore_api_key are required. Set in vault."
  when: >
    simulators_tsstore_admin_key is not defined or simulators_tsstore_admin_key == "" or
    simulators_tsstore_api_key is not defined or simulators_tsstore_api_key == ""

- name: Validate GHCR token
  ansible.builtin.fail:
    msg: "ghcr_token is required for pulling from GitHub Container Registry."
  when: ghcr_token is not defined or ghcr_token == ""

- name: Login to GitHub Container Registry
  ansible.builtin.shell:
    cmd: echo "{{ ghcr_token }}" | docker login ghcr.io -u trv-enterprises --password-stdin
  register: docker_login
  changed_when: false
  no_log: true

- name: Create simulators deployment directory
  ansible.builtin.file:
    path: "{{ simulators_deploy_dir }}"
    state: directory
    mode: '0755'

- name: Sync simulator source to remote
  ansible.posix.synchronize:
    src: "{{ simulators_source }}/"
    dest: "{{ simulators_deploy_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.claude"
      - "--exclude=*.pyc"
      - "--exclude=__pycache__"
      - "--exclude=.DS_Store"
      - "--exclude=._*"
      - "--exclude=.env"
      - "--exclude=.env.example"

- name: Deploy simulators env file
  ansible.builtin.template:
    src: simulators.env.j2
    dest: "{{ simulators_deploy_dir }}/.env"
    mode: '0600'
  register: env_file

- name: Build Docker images
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ simulators_deploy_dir }}"
  register: build_result
  changed_when: "'Building' in build_result.stdout or 'Building' in build_result.stderr"

# Pull the ts-store image explicitly. Without this, `up -d` only pulls
# when the image is missing locally — so version bumps in defaults
# (e.g. v0.6.1 -> v0.6.2) would silently keep running the old image.
- name: Pull ts-store image
  ansible.builtin.command:
    cmd: docker compose pull tsstore
    chdir: "{{ simulators_deploy_dir }}"
  register: pull_result
  changed_when: "'Pulled' in pull_result.stderr or 'Downloaded' in pull_result.stderr"

- name: Start services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ simulators_deploy_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr"

- name: Wait for ts-store to be healthy
  ansible.builtin.command:
    cmd: docker inspect simulators-tsstore --format '{{ '{{' }}.State.Health.Status{{ '}}' }}'
  register: health_check
  until: health_check.stdout == "healthy"
  retries: 15
  delay: 2
  changed_when: false

- name: Fix ts-store data volume ownership
  ansible.builtin.command:
    cmd: docker exec -u root simulators-tsstore chown tsstore:tsstore /data
  changed_when: false
  failed_when: false

- name: Get existing stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores"
    method: GET
    headers:
      X-Admin-Key: "{{ simulators_tsstore_admin_key }}"
    return_content: true
  register: stores_response
  ignore_errors: true

- name: Create location stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores"
    method: POST
    headers:
      X-Admin-Key: "{{ simulators_tsstore_admin_key }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ item }}"
      num_blocks: 200000
      data_block_size: 512
      index_block_size: 4096
    status_code: [200, 201, 409]
  loop: "{{ simulators_tsstore_stores }}"
  when: stores_response is failed or stores_response.json.stores is not defined or item not in stores_response.json.stores
  register: store_creation

# Use Jinja's hash('sha256') filter, NOT a shell `sha256sum` pipe: the command
# module runs without a shell, so the pipe would be captured literally (it was —
# producing a garbage hash like "tsstore_...|sha256sum|awk{print $1}").
- name: Compute shared API key hash
  ansible.builtin.set_fact:
    simulators_api_key_hash: "{{ simulators_tsstore_api_key | hash('sha256') }}"
  no_log: true

- name: Write shared API key to new location stores
  ansible.builtin.copy:
    dest: /tmp/tsstore-keys-{{ item.item }}.json
    content: |
      {
        "store_name": "{{ item.item }}",
        "keys": [
          {
            "id": "{{ simulators_tsstore_api_key[8:16] }}",
            "hash": "{{ simulators_api_key_hash }}",
            "created_at": "{{ ansible_facts.date_time.iso8601 }}",
            "note": "Shared key via Ansible deploy"
          }
        ]
      }
    mode: '0600'
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

- name: Copy location-store key files into ts-store container
  ansible.builtin.command:
    cmd: docker cp /tmp/tsstore-keys-{{ item.item }}.json simulators-tsstore:/data/{{ item.item }}/keys.json
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

# docker cp lands the file root-owned; ts-store runs as `tsstore` and must be
# able to read keys.json (a root-owned 0600 file → 401 "authentication failed").
- name: Fix location-store keys.json ownership
  ansible.builtin.command:
    cmd: docker exec -u root simulators-tsstore chown tsstore:tsstore /data/{{ item.item }}/keys.json
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

- name: Clean up temporary location-store key files
  ansible.builtin.file:
    path: /tmp/tsstore-keys-{{ item.item }}.json
    state: absent
  loop: "{{ store_creation.results }}"
  when: item.changed | default(false)

# --- Combined "tidy" schema store(s) -----------------------------------------
# Created as type=schema. Unlike the location stores above, the schema-store
# handling is driven by ON-DISK STATE rather than the create task's `changed`
# flag, so it is fully idempotent and self-healing: ts-store auto-generates a
# random "Initial key" in keys.json on store creation (which would 401 our
# shared-key writer), so we always reconcile keys.json to the shared-key hash
# when it differs, and apply the schema whenever the store has none yet.

# Create the schema store via the API. The type field is `data_type` (NOT
# `type`) — the same key the dashboard's ts-store client uses. ts-store rejects
# an unknown field rather than silently defaulting to a json store, so a wrong
# field name would fail loudly here.
- name: Create schema stores (only if absent)
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores"
    method: POST
    headers:
      X-Admin-Key: "{{ simulators_tsstore_admin_key }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ item.key }}"
      data_type: schema
      num_blocks: 200000
      data_block_size: 512
      index_block_size: 4096
    status_code: [200, 201, 409]
  loop: "{{ simulators_tsstore_schema_stores | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: stores_response is failed or stores_response.json.stores is not defined or item.key not in stores_response.json.stores

- name: Read existing schema-store keys.json (if any)
  ansible.builtin.command:
    cmd: docker exec simulators-tsstore cat /data/{{ item.key }}/keys.json
  loop: "{{ simulators_tsstore_schema_stores | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: schema_keys_existing
  changed_when: false
  failed_when: false

- name: Reconcile schema-store keys.json to the shared key
  ansible.builtin.copy:
    dest: /tmp/tsstore-keys-{{ item.item.key }}.json
    content: |
      {
        "store_name": "{{ item.item.key }}",
        "keys": [
          {
            "id": "{{ simulators_tsstore_api_key[8:16] }}",
            "hash": "{{ simulators_api_key_hash }}",
            "created_at": "{{ ansible_facts.date_time.iso8601 }}",
            "note": "Shared key via Ansible deploy"
          }
        ]
      }
    mode: '0600'
  loop: "{{ schema_keys_existing.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: >
    item.rc != 0 or
    (item.stdout | from_json).keys[0].hash | default('') != simulators_api_key_hash
  register: schema_keys_written

- name: Copy reconciled schema-store key files into ts-store container
  ansible.builtin.command:
    cmd: docker cp /tmp/tsstore-keys-{{ item.item.item.key }}.json simulators-tsstore:/data/{{ item.item.item.key }}/keys.json
  loop: "{{ schema_keys_written.results }}"
  loop_control:
    label: "{{ item.item.item.key | default('skipped') }}"
  when: not (item.skipped | default(false))

# Same ownership fix as the location stores — docker cp lands root-owned.
- name: Fix schema-store keys.json ownership
  ansible.builtin.command:
    cmd: docker exec -u root simulators-tsstore chown tsstore:tsstore /data/{{ item.item.item.key }}/keys.json
  loop: "{{ schema_keys_written.results }}"
  loop_control:
    label: "{{ item.item.item.key | default('skipped') }}"
  when: not (item.skipped | default(false))

- name: Clean up temporary schema-store key files
  ansible.builtin.file:
    path: /tmp/tsstore-keys-{{ item.item.item.key }}.json
    state: absent
  loop: "{{ schema_keys_written.results }}"
  loop_control:
    label: "{{ item.item.item.key | default('skipped') }}"
  when: not (item.skipped | default(false))

- name: Restart ts-store to reload keys
  ansible.builtin.command:
    cmd: docker compose restart tsstore
    chdir: "{{ simulators_deploy_dir }}"
  when: store_creation.changed or (schema_keys_written.changed | default(false))

- name: Wait for ts-store to be healthy after key reload
  ansible.builtin.command:
    cmd: docker inspect simulators-tsstore --format '{{ '{{' }}.State.Health.Status{{ '}}' }}'
  register: health_recheck
  until: health_recheck.stdout == "healthy"
  retries: 15
  delay: 2
  changed_when: false
  when: store_creation.changed or (schema_keys_written.changed | default(false))

# Apply the schema, authenticating with the store's own (now shared) API key —
# the admin key is rejected by this endpoint. Idempotent: a schema-type store
# with NO schema set yet returns HTTP 404 {"error":"no schema defined"} on GET
# (verified on v0.6.1); once a schema is set the GET returns 200 with the field
# list. We PUT only on the 404 case, so re-deploys never re-PUT (schema is
# immutable once set — a re-PUT would error).
- name: Check current schema of schema stores
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores/{{ item.key }}/schema"
    method: GET
    headers:
      X-API-Key: "{{ simulators_tsstore_api_key }}"
    status_code: [200, 404]
  loop: "{{ simulators_tsstore_schema_stores | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: schema_current
  changed_when: false

- name: Apply schema to schema stores that have none
  ansible.builtin.uri:
    url: "http://localhost:{{ tsstore_port }}/api/stores/{{ item.item.key }}/schema"
    method: PUT
    headers:
      X-API-Key: "{{ simulators_tsstore_api_key }}"
    body_format: json
    body: "{{ item.item.value.schema }}"
    status_code: 200
  loop: "{{ schema_current.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: item.status == 404

- name: Show service status
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: "{{ simulators_deploy_dir }}"
  register: status
  changed_when: false

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Simulators deployed successfully!
      Directory: {{ simulators_deploy_dir }}
      Services:
      {{ status.stdout }}

---
# Simulators role internal constants.
# Things the operator might want to override per host live in
# defaults/main.yml — vars/ has higher precedence than host_vars.

# Deployment directory on remote host.
simulators_deploy_dir: /root/simulators

# Port mapping: container port -> host port.
tsstore_port: 21080
tsstore_internal_port: 21080

# Location stores the data-writer publishes to.
simulators_tsstore_stores:
  - warehouse
  - server-room
  - manufacturing

---
# tsstore Deployment Playbook
#
# Deploys the ts-store time-series store + Go collectors from GitHub
# release assets. System-systemd install. Hosts must have NOPASSWD
# sudo for the SSH user (Pi/srv hosts already do).
#
# Usage:
#   ansible-playbook playbooks/tsstore-deploy.yml --limit trv-srv-001
#   ansible-playbook playbooks/tsstore-deploy.yml --limit pis
#
# Override the release version:
#   ansible-playbook playbooks/tsstore-deploy.yml --limit trv-srv-001 \
#     -e "tsstore_version=v0.6.2"
#
# Required vars per host (from inventory/host_vars/<host>.yml):
#   - tsstore_admin_key
#   - tsstore_store_api_keys (one per store the host writes to)
#   - tsstore_collectors (list of Go collectors to deploy)
#   - tsstore_mqtt_streams (optional push connections)

- name: Deploy tsstore
  hosts: tsstore
  become: false

  roles:
    - tsstore

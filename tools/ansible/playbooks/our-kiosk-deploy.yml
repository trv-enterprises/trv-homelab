---
# Our Kiosk Deployment Playbook
#
# Deploys the voice-controlled smart display to a kiosk device.
# The display shows a clock by default and responds to voice commands
# to switch views, show dashboards, set cooking timers, etc.
#
# Deploys to trv-kiosk-001 (Minisforum M1) by default.
# Override with -e kiosk_target=<host> for other targets.
#
# Deploy (default: trv-kiosk-001):
#   ansible-playbook playbooks/our-kiosk-deploy.yml
#
# Deploy with sudo password (for systemd service setup):
#   ansible-playbook playbooks/our-kiosk-deploy.yml -K
#
# Deploy with systemd setup:
#   ansible-playbook playbooks/our-kiosk-deploy.yml -K -e kiosk_target=trv-kiosk-001 --tags setup-systemd

- name: Deploy Our Kiosk
  hosts: "{{ kiosk_target | default('trv-kiosk-001') }}"
  gather_facts: false
  become: false

  vars:
    kiosk_deploy_dir: "{{ ansible_env.HOME | default('/home/' + ansible_user) }}/voice-display"
    kiosk_home: "/home/{{ ansible_user }}"
    kiosk_src_dir: "{{ playbook_dir }}/../../../../trv-kiosk"
    kiosk_port: 5174
    # Dashboard server (LXC 100 on trv-srv-002). Override via -e to deploy
    # against a different backend.
    kiosk_api_url: "{{ dashboard_api_url | default('http://100.97.221.61:3001') }}"
    kiosk_websocket_port: 8765
    # MQTT broker the voice commander subscribes to for frigate/weather/sensor alerts.
    # Services LXC on trv-srv-002. Plain MQTT (no auth) on the LAN.
    kiosk_mqtt_broker: "{{ services_mqtt_broker | default('100.112.38.96') }}"
    kiosk_mqtt_port: 1883
    # ALSA output device for voice/alert/chime playback. The index may
    # change across boots; use a named device if you have one.
    kiosk_alert_audio_device: "plughw:1,0"
    # USB mic (EMEET M0 Plus) discovery
    kiosk_audio_device_name: "EMEET"
    kiosk_audio_device_index: 11
    # EMEET M0 Plus mic gain: numid=6, range 0-4 (-6dB to +6dB), 3 = +3dB
    kiosk_mic_gain: 3

  tasks:
    # Build locally first
    - name: Build display app locally
      delegate_to: localhost
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ kiosk_src_dir }}/display"
      register: build_result
      changed_when: true

    # Create deployment directory (no sudo needed for home dir)
    - name: Create deployment directory
      ansible.builtin.raw: mkdir -p ~/voice-display/sounds
      changed_when: true

    # Sync files using synchronize (runs locally, doesn't need remote Python)
    - name: Sync display app
      ansible.posix.synchronize:
        src: "{{ kiosk_src_dir }}/display/"
        dest: "~/voice-display/display/"
        delete: true
        rsync_opts:
          - "--exclude=node_modules"

    - name: Sync voice pipeline
      ansible.posix.synchronize:
        src: "{{ kiosk_src_dir }}/voice/"
        dest: "~/voice-display/voice/"
        delete: true
        rsync_opts:
          - "--exclude=venv"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          # config.yaml is rendered by the template task below with real
          # values from inventory. Don't let rsync clobber it with the
          # (intentionally broken) placeholder copy from the repo.
          - "--exclude=config.yaml"
          - "--exclude=config.yaml.j2"
          - "--exclude=config.yaml.example"

    # Render the real voice/config.yaml from the template using inventory
    # values. This replaces the placeholder file that used to live in the
    # public repo with real MQTT broker, dashboard URL, and user-specific
    # sound paths.
    - name: Render voice config.yaml from template
      ansible.builtin.template:
        src: "{{ kiosk_src_dir }}/voice/config.yaml.j2"
        dest: "~/voice-display/voice/config.yaml"
        mode: '0644'

    - name: Sync systemd services
      ansible.posix.synchronize:
        src: "{{ kiosk_src_dir }}/systemd/"
        dest: "~/voice-display/systemd/"
        delete: true

    # No Node.js dependencies needed - we serve static files with Python

    - name: Set up Python venv and install dependencies
      ansible.builtin.raw: |
        cd ~/voice-display/voice
        if [ ! -d "venv" ]; then
          python3 -m venv venv
        fi
        source venv/bin/activate
        pip install -r requirements.txt
      changed_when: true

    # Create environment file
    - name: Create display environment file
      ansible.builtin.raw: |
        echo "VITE_API_URL={{ kiosk_api_url }}" > ~/voice-display/display/.env
      changed_when: true

    # Set microphone gain
    - name: Set microphone gain (EMEET M0 Plus)
      ansible.builtin.raw: |
        amixer -c 2 cset numid=6 {{ kiosk_mic_gain }}
      changed_when: true
      failed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          Our Kiosk files deployed to ~/voice-display/

          To start manually:
            cd ~/voice-display/display/dist
            python3 -m http.server {{ kiosk_port }} --bind 0.0.0.0

          Display URL: http://{{ ansible_host }}:{{ kiosk_port }}

          For systemd services, run with -K flag and use the setup-systemd tag:
            ansible-playbook playbooks/our-kiosk-deploy.yml -K --tags setup-systemd

# Restart services and clean-boot Chromium so a fresh display bundle
# and Python changes take effect without a manual reboot. Mirrors the
# cache-clear play in dashboard-deploy.yml.
- name: Restart kiosk services and clear browser cache
  hosts: "{{ kiosk_target | default('trv-kiosk-001') }}"
  gather_facts: false
  become: false

  vars:
    ansible_user: root

  tasks:
    - name: Restart voice pipeline (picks up Python + config changes)
      ansible.builtin.raw: systemctl restart voice-display-voice
      failed_when: false

    - name: Restart display HTTP server (serves new dist bundle)
      ansible.builtin.raw: systemctl restart voice-display-ui
      failed_when: false

    - name: Stop kiosk display
      ansible.builtin.raw: systemctl stop kiosk-display
      failed_when: false

    - name: Clear Chromium snap cache and kiosk disk cache
      ansible.builtin.raw: rm -rf /home/tviviano/snap/chromium/common/chromium/Default /tmp/chromium
      failed_when: false

    - name: Start kiosk display
      ansible.builtin.raw: systemctl start kiosk-display
      failed_when: false

# Optional: Set up systemd services (requires sudo password with -K)
- name: Setup systemd services
  hosts: "{{ kiosk_target | default('trv-kiosk-001') }}"
  gather_facts: false
  become: true
  tags:
    - setup-systemd
    - never

  vars:
    kiosk_deploy_dir: "/home/{{ ansible_user }}/voice-display"
    kiosk_port: 5174
    kiosk_api_url: "http://<dashboard-tailscale-ip>:3001"

  tasks:
    - name: Copy systemd service files
      ansible.builtin.raw: |
        cp {{ kiosk_deploy_dir }}/systemd/*.service /etc/systemd/system/
      changed_when: true

    - name: Reload systemd and enable services
      ansible.builtin.raw: |
        systemctl daemon-reload
        systemctl enable voice-display-ui voice-display-voice
        systemctl restart voice-display-ui
      changed_when: true

    - name: Enable kiosk-display service (Minisforum only)
      ansible.builtin.raw: |
        if [ -f /etc/systemd/system/kiosk-display.service ]; then
          systemctl enable kiosk-display
          systemctl restart kiosk-display
        fi
      changed_when: true

    - name: Check service status
      ansible.builtin.raw: |
        echo "voice-display-ui: $(systemctl is-active voice-display-ui)"
        echo "voice-display-voice: $(systemctl is-active voice-display-voice)"
        echo "kiosk-display: $(systemctl is-active kiosk-display 2>/dev/null || echo 'not installed')"
      register: svc_status
      changed_when: false
      failed_when: false

    - name: Display systemd status
      ansible.builtin.debug:
        msg: |
          Systemd services configured!
          {{ svc_status.stdout | default('unknown') | trim }}

          Commands:
            sudo systemctl status kiosk-display voice-display-ui voice-display-voice
            journalctl -u voice-display-voice -f

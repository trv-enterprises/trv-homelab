---
# Dashboard Deployment Playbook
#
# Secrets are loaded from Ansible Vault (group_vars/all/vault.yml)
#
# Deploy:
#   ansible-playbook playbooks/dashboard-deploy.yml
#
# Deploy specific version:
#   ansible-playbook playbooks/dashboard-deploy.yml -e "dashboard_version=0.3.1"

- name: Deploy Dashboard
  hosts: dashboard
  become: false

  roles:
    - dashboard

- name: Clear kiosk browser cache
  hosts: kiosk
  gather_facts: false
  become: true

  tasks:
    - name: Stop kiosk display
      ansible.builtin.systemd:
        name: kiosk-display
        state: stopped
      failed_when: false

    - name: Clear Chromium cache and profile
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/{{ ansible_user }}/.config/chromium
        - /home/{{ ansible_user }}/.cache/chromium
        - /home/{{ ansible_user }}/.local/share/chromium
        - /tmp/chromium

    - name: Start kiosk display
      ansible.builtin.systemd:
        name: kiosk-display
        state: started
      failed_when: false

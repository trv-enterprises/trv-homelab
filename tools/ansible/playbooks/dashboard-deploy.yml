---
# Dashboard Deployment Playbook
#
# Secrets are loaded from Ansible Vault (group_vars/all/vault.yml)
#
# Deploy:
#   ansible-playbook playbooks/dashboard-deploy.yml
#
# Deploy specific version:
#   ansible-playbook playbooks/dashboard-deploy.yml -e "dashboard_version=0.3.1"

- name: Deploy Dashboard
  hosts: dashboard
  become: false

  roles:
    - dashboard

- name: Clear kiosk browser cache
  hosts: kiosk
  gather_facts: false
  become: false

  vars:
    ansible_user: root

  tasks:
    - name: Stop kiosk display
      ansible.builtin.raw: systemctl stop kiosk-display
      failed_when: false

    - name: Clear Chromium snap cache
      ansible.builtin.raw: rm -rf /home/tviviano/snap/chromium/common/chromium/Default /tmp/chromium
      failed_when: false

    - name: Start kiosk display
      ansible.builtin.raw: systemctl start kiosk-display
      failed_when: false

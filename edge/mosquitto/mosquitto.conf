# Mosquitto MQTT Broker Configuration
# See https://mosquitto.org/man/mosquitto-conf-5.html

# Listener - accept connections on all interfaces
listener 1883
protocol mqtt

# Allow anonymous connections (for internal network use)
# For production, set to false and configure authentication
allow_anonymous true

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection settings
max_connections -1
max_queued_messages 1000

# Keep alive
max_keepalive 300
